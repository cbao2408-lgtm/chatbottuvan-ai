<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trò Chuyện</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#c7d2fe,#e9d5ff);
}

.chat-container{
  width:430px;
  height:720px;
  background:white;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
}

.header{
  background:#6366f1;
  color:white;
  text-align:center;
  padding:18px;
}

.header h2{
  margin-bottom:5px;
}

.status{
  font-size:13px;
  opacity:0.9;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:#f8fafc;
}

.message{
  display:flex;
  margin-bottom:14px;
}

.user{
  justify-content:flex-end;
}

.bot{
  justify-content:flex-start;
}

.bubble{
  max-width:80%;
  padding:13px 16px;
  border-radius:18px;
  line-height:1.6;
  font-size:14px;
  animation:fadeIn 0.25s ease;
}

.user .bubble{
  background:#6366f1;
  color:white;
  border-bottom-right-radius:6px;
}

.bot .bubble{
  background:#e5e7eb;
  color:#111827;
  border-bottom-left-radius:6px;
}

.input-area{
  display:flex;
  padding:14px;
  border-top:1px solid #ddd;
  background:white;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
  font-size:14px;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#4f46e5;
}

.note{
  text-align:center;
  padding:10px;
  font-size:12px;
  background:#f1f5f9;
  color:#64748b;
}

.typing{
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
  padding-left:5px;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(5px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <h2>AI Trò Chuyện</h2>
    <div class="status">
      Trò chuyện • Tâm sự • Hài hước • Đồng hành 💙
    </div>
  </div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      <div class="bubble">
        Xin chào 👋<br><br>

        Mình là AI trò chuyện đa năng 🤖<br><br>

        Bạn có thể:
        <br><br>

        • Tâm sự cảm xúc 💙<br>
        • Kể chuyện vui 😄<br>
        • Hỏi lời khuyên 🌿<br>
        • Tán gẫu mọi thứ ✨
      </div>
    </div>

  </div>

  <div class="note">
    AI trò chuyện giải trí và hỗ trợ tinh thần cơ bản.
  </div>

  <div class="input-area">
    <input type="text"
      id="userInput"
      placeholder="Nhập tin nhắn...">
    <button onclick="sendMessage()">Gửi</button>
  </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");

const jokes = [

  "Giáo viên hỏi: 'Em có thuộc bài không?' — Học sinh: 'Dạ thuộc… nhưng thuộc bạn bên cạnh.' 😂",

  "Máy tính nói với WiFi: 'Không có cậu chắc tớ cô đơn lắm.' 🤖",

  "Người ta giảm cân bằng thể dục. Còn tôi giảm tiền bằng mua đồ ăn 😅",

  "Có một bạn hỏi: 'Cậu học giỏi toán không?' — Bạn kia trả lời: 'Tớ tính nghỉ học rồi.' 😭",

  "Học sinh: 'Em bị mất ngủ vì học nhiều.' — Thực tế: cầm điện thoại tới 2 giờ sáng 📱"

];

const relaxTips = [

  "Bạn có thể thử nghe nhạc nhẹ hoặc đi dạo vài phút 🌿",

  "Hít thở sâu chậm rãi có thể giúp cơ thể thư giãn hơn 💫",

  "Viết ra cảm xúc đôi khi giúp lòng nhẹ hơn 📝",

  "Ngủ đủ giấc cũng rất quan trọng 💙",

  "Hãy thử nói chuyện với người bạn tin tưởng 🤝"

];

const normalReplies = [

  "Mình đang lắng nghe bạn đây 💙",

  "Nghe có vẻ thú vị đó 😄",

  "Bạn có muốn kể thêm không?",

  "Mình hiểu 🌿",

  "Điều đó chắc hẳn khiến bạn suy nghĩ khá nhiều.",

  "Bạn thấy thế nào về điều đó?",

  "Mình thích trò chuyện với bạn ✨"

];

function randomReply(arr){

  return arr[Math.floor(Math.random() * arr.length)];

}

function addMessage(text, sender){

  const msg = document.createElement("div");

  msg.classList.add("message", sender);

  const bubble = document.createElement("div");

  bubble.classList.add("bubble");

  bubble.innerHTML = text;

  msg.appendChild(bubble);

  chatBox.appendChild(msg);

  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(){

  const typing = document.createElement("div");

  typing.classList.add("typing");

  typing.id = "typing";

  typing.innerHTML = "AI đang trả lời...";

  chatBox.appendChild(typing);

  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }

}

function getReply(message){

  const text = message.toLowerCase();

  // CHÀO HỎI
  if(
    text.includes("xin chào") ||
    text.includes("hello") ||
    text.includes("hi")
  ){
    return "Xin chào 👋 Hôm nay bạn thế nào?";
  }

  // HỎI TÊN
  if(
    text.includes("tên gì") ||
    text.includes("bạn là ai")
  ){
    return "Mình là AI trò chuyện và đồng hành cảm xúc 🤖";
  }

  // CẢM ƠN
  if(
    text.includes("cảm ơn")
  ){
    return "Không có gì 💙 Mình luôn sẵn sàng trò chuyện với bạn.";
  }

  // TRUYỆN CƯỜI
  if(
    text.includes("truyện cười") ||
    text.includes("kể chuyện cười") ||
    text.includes("hài")
  ){
    return randomReply(jokes);
  }

  // BUỒN
  if(
    text.includes("buồn") ||
    text.includes("khóc") ||
    text.includes("thất vọng")
  ){
    return "Mình hiểu cảm giác đó có thể khá nặng nề 💙 Bạn muốn chia sẻ thêm không?";
  }

  // STRESS
  if(
    text.includes("stress") ||
    text.includes("áp lực") ||
    text.includes("căng thẳng")
  ){
    return "Có vẻ bạn đang chịu khá nhiều áp lực 🌿 Đừng quên dành thời gian nghỉ ngơi nhé.";
  }

  // CÔ ĐƠN
  if(
    text.includes("cô đơn") ||
    text.includes("một mình")
  ){
    return "Bạn không hề một mình đâu 🤝 Mình vẫn đang lắng nghe bạn.";
  }

  // MỆT
  if(
    text.includes("mệt") ||
    text.includes("kiệt sức")
  ){
    return "Bạn đã cố gắng rất nhiều rồi 🌱 Nghỉ ngơi một chút cũng quan trọng.";
  }

  // GIẢI TỎA
  if(
    text.includes("giải tỏa") ||
    text.includes("thư giãn") ||
    text.includes("bớt buồn")
  ){
    return randomReply(relaxTips);
  }

  // VUI
  if(
    text.includes("vui") ||
    text.includes("hạnh phúc")
  ){
    return "Nghe bạn nói vậy mình cũng thấy vui theo 😄";
  }

  return randomReply(normalReplies);

}

function sendMessage(){

  const input = document.getElementById("userInput");

  const text = input.value.trim();

  if(text === "") return;

  addMessage(text, "user");

  input.value = "";

  showTyping();

  setTimeout(() => {

    removeTyping();

    const reply = getReply(text);

    addMessage(reply, "bot");

  }, 1000);

}

document.getElementById("userInput")
.addEventListener("keypress", function(event){

  if(event.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
