<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Đồng Hành Cảm Xúc</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#c7d2fe,#ede9fe);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.chat-container{
  width:420px;
  height:720px;
  background:white;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
}

.header{
  background:#6366f1;
  color:white;
  padding:18px;
  text-align:center;
}

.header h2{
  margin-bottom:5px;
}

.status{
  font-size:13px;
  opacity:0.9;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:#f8fafc;
}

.message{
  display:flex;
  margin-bottom:14px;
}

.user{
  justify-content:flex-end;
}

.bot{
  justify-content:flex-start;
}

.bubble{
  max-width:80%;
  padding:13px 16px;
  border-radius:18px;
  line-height:1.6;
  font-size:14px;
  animation:fadeIn 0.25s ease;
}

.user .bubble{
  background:#6366f1;
  color:white;
  border-bottom-right-radius:6px;
}

.bot .bubble{
  background:#e5e7eb;
  color:#111827;
  border-bottom-left-radius:6px;
}

.input-area{
  display:flex;
  padding:14px;
  border-top:1px solid #ddd;
  background:white;
}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  outline:none;
  font-size:14px;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#4f46e5;
}

.note{
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#64748b;
  background:#f1f5f9;
}

.typing{
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
  padding-left:5px;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(5px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <h2>AI Đồng Hành Cảm Xúc</h2>
    <div class="status">Trò chuyện • Chia sẻ • Động viên 💙</div>
  </div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      <div class="bubble">
        Xin chào 🌿<br><br>
        Mình là AI đồng hành cảm xúc.  
        Bạn có thể:
        <br><br>
        • Chia sẻ tâm trạng 💭<br>
        • Xin lời động viên 💙<br>
        • Kể truyện cười 😄<br>
        • Hỏi cách giải tỏa cảm xúc 🌱
      </div>
    </div>

  </div>

  <div class="note">
    AI hỗ trợ trò chuyện tinh thần cơ bản và không thay thế chuyên gia tâm lý.
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Hãy chia sẻ điều bạn đang nghĩ...">
    <button onclick="sendMessage()">Gửi</button>
  </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");

const replies = {

  sad: [
    "Mình hiểu cảm giác buồn có thể khiến mọi thứ trở nên nặng nề 💙",
    "Bạn đã cố gắng rất nhiều rồi 🌿",
    "Đôi khi buồn chỉ là dấu hiệu cho thấy bạn đã chịu áp lực quá lâu.",
    "Mình đang lắng nghe bạn đây 🤝"
  ],

  stress: [
    "Có vẻ bạn đang chịu khá nhiều áp lực 🌱",
    "Bạn không cần phải giải quyết mọi thứ cùng lúc.",
    "Hãy thử nghỉ ngơi và hít thở sâu vài phút nhé 💫"
  ],

  lonely: [
    "Cô đơn là cảm giác không dễ chịu 🤍",
    "Bạn xứng đáng được lắng nghe và quan tâm.",
    "Đôi khi chỉ cần một cuộc trò chuyện nhỏ cũng giúp lòng nhẹ hơn."
  ],

  happy: [
    "Nghe bạn nói vậy mình cũng thấy vui theo 😄",
    "Thật tuyệt khi bạn đang có cảm xúc tích cực 🌟",
    "Hãy giữ năng lượng tốt đẹp này nhé 💫"
  ],

  tired: [
    "Bạn đã mệt nhiều rồi phải không 🌿",
    "Nghỉ ngơi cũng rất quan trọng 💙",
    "Đừng ép bản thân phải mạnh mẽ mọi lúc."
  ],

  anxiety: [
    "Lo lắng quá nhiều có thể khiến bạn kiệt sức 🌱",
    "Hãy thử tập trung vào từng việc nhỏ nhé.",
    "Mọi chuyện có thể sẽ ổn dần thôi 💙"
  ]

};

const jokes = [

  "Giáo viên hỏi: 'Em có thuộc bài không?' — Học sinh: 'Dạ thuộc… nhưng thuộc bạn bên cạnh.' 😂",

  "Máy tính nói với WiFi: 'Không có cậu chắc tớ cô đơn lắm.' 🤖",

  "Người ta giảm cân bằng thể dục. Còn tôi giảm tiền bằng mua đồ ăn 😅",

  "Học sinh: 'Em bị mất ngủ vì học nhiều.' — Thực tế: cầm điện thoại tới 2 giờ sáng 📱",

  "Có một bạn hỏi: 'Cậu học giỏi toán không?' — Bạn kia trả lời: 'Tớ tính nghỉ học rồi.' 😭"

];

const relaxTips = [

  "Bạn có thể thử nghe nhạc nhẹ hoặc đi dạo vài phút 🌿",

  "Hít thở sâu chậm rãi vài lần có thể giúp cơ thể thư giãn hơn 💫",

  "Viết ra suy nghĩ của mình đôi khi giúp lòng nhẹ hơn 📝",

  "Nghỉ ngơi và ngủ đủ giấc cũng rất quan trọng 💙",

  "Thử nói chuyện với người bạn tin tưởng nhé 🤝"

];

function randomReply(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function addMessage(text, sender){

  const msg = document.createElement("div");

  msg.classList.add("message", sender);

  const bubble = document.createElement("div");

  bubble.classList.add("bubble");

  bubble.innerHTML = text;

  msg.appendChild(bubble);

  chatBox.appendChild(msg);

  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(){

  const typing = document.createElement("div");

  typing.classList.add("typing");

  typing.id = "typing";

  typing.innerHTML = "AI đang trả lời...";

  chatBox.appendChild(typing);

  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

function getReply(message){

  const text = message.toLowerCase();

  // TRUYỆN CƯỜI
  if(
    text.includes("truyện cười") ||
    text.includes("kể chuyện cười") ||
    text.includes("hài")
  ){
    return randomReply(jokes);
  }

  // GIẢI TỎA CẢM XÚC
  if(
    text.includes("giải tỏa") ||
    text.includes("bớt buồn") ||
    text.includes("thư giãn") ||
    text.includes("ổn hơn")
  ){
    return randomReply(relaxTips);
  }

  // BUỒN
  if(
    text.includes("buồn") ||
    text.includes("khóc") ||
    text.includes("thất vọng")
  ){
    return randomReply(replies.sad);
  }

  // STRESS
  if(
    text.includes("stress") ||
    text.includes("áp lực") ||
    text.includes("căng thẳng")
  ){
    return randomReply(replies.stress);
  }

  // CÔ ĐƠN
  if(
    text.includes("cô đơn") ||
    text.includes("một mình")
  ){
    return randomReply(replies.lonely);
  }

  // MỆT
  if(
    text.includes("mệt") ||
    text.includes("kiệt sức")
  ){
    return randomReply(replies.tired);
  }

  // LO LẮNG
  if(
    text.includes("lo") ||
    text.includes("sợ")
  ){
    return randomReply(replies.anxiety);
  }

  // VUI
  if(
    text.includes("vui") ||
    text.includes("hạnh phúc")
  ){
    return randomReply(replies.happy);
  }

  // CẢM ƠN
  if(
    text.includes("cảm ơn")
  ){
    return "Mình luôn sẵn sàng lắng nghe bạn 💙";
  }

  return "Mình hiểu 🌿 Bạn có muốn chia sẻ thêm điều đang khiến bạn suy nghĩ không?";
}

function sendMessage(){

  const input = document.getElementById("userInput");

  const text = input.value.trim();

  if(text === "") return;

  addMessage(text, "user");

  input.value = "";

  showTyping();

  setTimeout(() => {

    removeTyping();

    const reply = getReply(text);

    addMessage(reply, "bot");

  }, 1200);

}

document.getElementById("userInput")
.addEventListener("keypress", function(event){

  if(event.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
