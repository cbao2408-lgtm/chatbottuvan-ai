<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Trò Chuyện</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-container{
  width:420px;
  height:700px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 25px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
}

.header{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  text-align:center;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#f7f9fc;
}

.message{
  display:flex;
  margin-bottom:15px;
}

.user{
  justify-content:flex-end;
}

.bot{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:12px 15px;
  border-radius:15px;
  line-height:1.5;
}

.user .bubble{
  background:#4facfe;
  color:white;
  border-bottom-right-radius:5px;
}

.bot .bubble{
  background:#e3f2fd;
  color:#333;
  border-bottom-left-radius:5px;
}

.input-box{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
  background:white;
}

input{
  flex:1;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#2196f3;
}

</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    AI Trò Chuyện
  </div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      <div class="bubble">
        Xin chào 👋<br>
        Tôi là AI trò chuyện offline, hãy nói chuyện với tôi nhé.
      </div>
    </div>

  </div>

  <div class="input-box">

    <input
      type="text"
      id="userInput"
      placeholder="Nhập tin nhắn..."
    >

    <button onclick="sendMessage()">
      Gửi
    </button>

  </div>

</div>

<script>

const answers = [

  {
    keywords:["xin chào","hello","hi"],
    reply:"Xin chào 👋 Hôm nay bạn thế nào?"
  },

  {
    keywords:["buồn","mệt","chán"],
    reply:"Mình hiểu cảm giác đó 😔 Hãy nghỉ ngơi một chút nhé."
  },

  {
    keywords:["vui","hạnh phúc"],
    reply:"Nghe thật tuyệt 😄"
  },

  {
    keywords:["bạn tên gì"],
    reply:"Tôi là AI trò chuyện bằng HTML 🤖"
  },

  {
    keywords:["kể chuyện cười"],
    reply:"Vì sao lập trình viên thích mùa đông? Vì không có bug 🐛❄️"
  },

  {
    keywords:["ai tạo ra bạn"],
    reply:"Tôi được tạo bằng HTML, CSS và JavaScript 💻"
  },

  {
    keywords:["cảm ơn"],
    reply:"Không có gì 💙"
  },

  {
    keywords:["tạm biệt"],
    reply:"Tạm biệt 👋 Chúc bạn một ngày tốt lành."
  }

];

const randomReplies = [

  "Mình đang lắng nghe đây 👂",
  "Bạn có thể kể thêm không?",
  "Nghe thú vị đó 😄",
  "Mình hiểu rồi 🌿",
  "Bạn muốn nói thêm gì nữa không?",
  "Mình luôn sẵn sàng trò chuyện 🤝"

];

function addMessage(text, sender){

  const chatBox =
    document.getElementById("chatBox");

  const message =
    document.createElement("div");

  message.classList.add("message", sender);

  const bubble =
    document.createElement("div");

  bubble.classList.add("bubble");

  bubble.innerHTML = text;

  message.appendChild(bubble);

  chatBox.appendChild(message);

  chatBox.scrollTop =
    chatBox.scrollHeight;
}

function getBotReply(userText){

  userText = userText.toLowerCase();

  for(let item of answers){

    for(let keyword of item.keywords){

      if(userText.includes(keyword)){
        return item.reply;
      }

    }

  }

  return randomReplies[
    Math.floor(
      Math.random() * randomReplies.length
    )
  ];

}

function sendMessage(){

  const input =
    document.getElementById("userInput");

  const text =
    input.value.trim();

  if(text === "") return;

  addMessage(text, "user");

  input.value = "";

  setTimeout(() => {

    const reply =
      getBotReply(text);

    addMessage(reply, "bot");

  }, 600);

}

document
.getElementById("userInput")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
