<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ChatGPT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#343541;
    height:100vh;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:#202123;
    color:white;
    display:flex;
    flex-direction:column;
    padding:15px;
}

.new-chat{
    background:#343541;
    border:1px solid #555;
    padding:14px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
    text-align:center;
    transition:0.3s;
}

.new-chat:hover{
    background:#444654;
}

.chat-history{
    flex:1;
    overflow-y:auto;
}

.history-item{
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.3s;
}

.history-item:hover{
    background:#343541;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    background:#444654;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #555;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

/* MESSAGE */

.message{
    display:flex;
    margin-bottom:20px;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:16px;
    border-radius:12px;
    line-height:1.6;
    font-size:16px;
}

.user .bubble{
    background:#19c37d;
    color:white;
}

.bot .bubble{
    background:#444654;
    color:white;
}

/* INPUT */

.input-area{
    background:#40414f;
    padding:18px;
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#2d2f39;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    background:#19c37d;
    border:none;
    color:white;
    padding:16px 22px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    opacity:0.8;
}

.typing{
    color:#aaa;
    margin-top:10px;
}

@media(max-width:700px){

    .sidebar{
        display:none;
    }

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="new-chat" onclick="newChat()">
        + Cuộc trò chuyện mới
    </div>

    <div class="chat-history" id="history">
        <div class="history-item">
            AI Chat
        </div>
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <div class="header">
        AI ChatGPT
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            <div class="bubble">
                Xin chào 👋 Tôi là AI của bạn. Hãy hỏi tôi bất cứ điều gì.
            </div>
        </div>

    </div>

    <div class="input-area">

        <input 
            type="text" 
            id="userInput"
            placeholder="Nhập câu hỏi..."
        >

        <button onclick="sendMessage()">
            Gửi
        </button>

    </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");

function addMessage(text, sender){

    const message = document.createElement("div");

    message.classList.add("message", sender);

    const bubble = document.createElement("div");

    bubble.classList.add("bubble");

    bubble.innerText = text;

    message.appendChild(bubble);

    chatBox.appendChild(message);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function aiReply(message){

    message = message.toLowerCase();

    /* HỎI ĐÁP */

    if(message.includes("xin chào")){
        return "Chào bạn 😄";
    }

    if(message.includes("bạn là ai")){
        return "Tôi là AI trò chuyện giống ChatGPT 🤖";
    }

    if(message.includes("html")){
        return "HTML là ngôn ngữ tạo cấu trúc website 🌐";
    }

    if(message.includes("css")){
        return "CSS giúp trang web đẹp hơn 🎨";
    }

    if(message.includes("javascript")){
        return "JavaScript giúp website hoạt động thông minh ⚡";
    }

    if(message.includes("truyện cười")){
        return "Lập trình viên đi khám bệnh. Bác sĩ hỏi: 'Anh bị sao?' — 'Em nghĩ là do thiếu RAM 😆'";
    }

    if(message.includes("buồn")){
        return "Bạn có thể nghỉ ngơi, nghe nhạc hoặc chia sẻ với người đáng tin 💙";
    }

    if(message.includes("code")){
        return "Tôi có thể giúp bạn viết code HTML, CSS, JS 🚀";
    }

    if(message.includes("chatgpt")){
        return "ChatGPT là AI trò chuyện thông minh được phát triển bởi OpenAI 🤖";
    }

    return "Tôi vẫn đang học thêm để trả lời thông minh hơn 🤔";
}

function sendMessage(){

    const input = document.getElementById("userInput");

    const text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    input.value = "";

    const typing = document.createElement("div");

    typing.classList.add("typing");

    typing.id = "typing";

    typing.innerText = "AI đang nhập...";

    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    setTimeout(() => {

        document.getElementById("typing").remove();

        const reply = aiReply(text);

        addMessage(reply, "bot");

    }, 1000);

}

function newChat(){

    chatBox.innerHTML = `

        <div class="message bot">
            <div class="bubble">
                Cuộc trò chuyện mới đã bắt đầu 👋
            </div>
        </div>

    `;
}

document.getElementById("userInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
