<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Tư Vấn Tâm Lý</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#dbeafe,#f5f3ff);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .chat-container{
      width:400px;
      height:650px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      display:flex;
      flex-direction:column;
    }

    .header{
      background:#6366f1;
      color:white;
      padding:20px;
      text-align:center;
    }

    .header h2{
      margin-bottom:5px;
    }

    .chat-box{
      flex:1;
      padding:15px;
      overflow-y:auto;
      background:#f9fafb;
    }

    .message{
      margin-bottom:15px;
      display:flex;
    }

    .user{
      justify-content:flex-end;
    }

    .bot{
      justify-content:flex-start;
    }

    .bubble{
      max-width:75%;
      padding:12px 15px;
      border-radius:15px;
      line-height:1.5;
      font-size:14px;
    }

    .user .bubble{
      background:#6366f1;
      color:white;
      border-bottom-right-radius:5px;
    }

    .bot .bubble{
      background:#e5e7eb;
      color:#111827;
      border-bottom-left-radius:5px;
    }

    .input-area{
      display:flex;
      padding:15px;
      border-top:1px solid #ddd;
      background:white;
    }

    input{
      flex:1;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:14px;
    }

    button{
      margin-left:10px;
      padding:12px 18px;
      border:none;
      background:#6366f1;
      color:white;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#4f46e5;
    }

    .note{
      padding:10px;
      font-size:12px;
      color:#6b7280;
      text-align:center;
      background:#f3f4f6;
    }
  </style>
</head>
<body>

  <div class="chat-container">

    <div class="header">
      <h2>AI Tư Vấn Tâm Lý</h2>
      <p>Luôn sẵn sàng lắng nghe bạn</p>
    </div>

    <div class="chat-box" id="chatBox">

      <div class="message bot">
        <div class="bubble">
          Xin chào 👋<br>
          Tôi là AI hỗ trợ tâm lý. Bạn đang cảm thấy thế nào hôm nay?
        </div>
      </div>

    </div>

    <div class="note">
      AI này chỉ hỗ trợ trò chuyện cơ bản, không thay thế chuyên gia tâm lý.
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Nhập cảm xúc của bạn...">
      <button onclick="sendMessage()">Gửi</button>
    </div>

  </div>

  <script>

    const chatBox = document.getElementById("chatBox");

    function addMessage(text, sender){

      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", sender);

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.innerHTML = text;

      messageDiv.appendChild(bubble);
      chatBox.appendChild(messageDiv);

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function botReply(message){

      message = message.toLowerCase();

      if(message.includes("buồn")){
        return "Mình rất tiếc khi bạn đang cảm thấy buồn 💙 Hãy thử nghỉ ngơi và chia sẻ với người bạn tin tưởng.";
      }

      else if(message.includes("căng thẳng") || message.includes("stress")){
        return "Có vẻ bạn đang chịu khá nhiều áp lực. Hãy thử hít thở sâu và nghỉ ngơi một chút nhé 🌿";
      }

      else if(message.includes("mệt")){
        return "Bạn đã cố gắng nhiều rồi. Nghỉ ngơi một chút cũng rất quan trọng 💫";
      }

      else if(message.includes("cô đơn")){
        return "Cảm giác cô đơn có thể rất khó chịu. Đôi khi nhắn tin hoặc gặp một người thân quen sẽ giúp bạn dễ chịu hơn 🤝";
      }

      else if(message.includes("lo lắng")){
        return "Lo lắng là điều ai cũng từng trải qua. Hãy thử tập trung vào từng việc nhỏ thay vì nghĩ quá nhiều cùng lúc 🌱";
      }

      else if(message.includes("vui")){
        return "Thật tuyệt khi nghe điều đó 😄 Hãy giữ năng lượng tích cực này nhé!";
      }

      else{
        return "Mình đang lắng nghe bạn ❤️ Bạn có thể chia sẻ thêm cảm xúc hoặc điều đang khiến bạn suy nghĩ.";
      }
    }

    function sendMessage(){

      const input = document.getElementById("userInput");
      const text = input.value.trim();

      if(text === "") return;

      addMessage(text, "user");

      setTimeout(() => {
        const reply = botReply(text);
        addMessage(reply, "bot");
      }, 700);

      input.value = "";
    }

    document.getElementById("userInput")
      .addEventListener("keypress", function(event){

      if(event.key === "Enter"){
        sendMessage();
      }

    });

  </script>

</body>
</html>
