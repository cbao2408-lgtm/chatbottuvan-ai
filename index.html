<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI ChatGPT Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#343541;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:100%;
    max-width:900px;
    height:95vh;
    background:#444654;
    display:flex;
    flex-direction:column;
    border-radius:12px;
    overflow:hidden;
}

.header{
    background:#202123;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:20px;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:15px;
    border-radius:12px;
    line-height:1.6;
    font-size:16px;
}

.user .bubble{
    background:#19c37d;
    color:white;
}

.bot .bubble{
    background:#2d2f39;
    color:white;
}

.input-area{
    display:flex;
    padding:15px;
    background:#40414f;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2d2f39;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    background:#19c37d;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    opacity:0.8;
}

.typing{
    color:#aaa;
    padding:10px 0;
    font-size:14px;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        AI ChatGPT Clone
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            <div class="bubble">
                Xin chào 👋 Tôi là AI trò chuyện của bạn.
            </div>
        </div>

    </div>

    <div class="input-area">
        <input 
            type="text" 
            id="userInput" 
            placeholder="Nhập tin nhắn..."
        >
        <button onclick="sendMessage()">
            Gửi
        </button>
    </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");

function addMessage(text, sender){

    const message = document.createElement("div");
    message.classList.add("message", sender);

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    bubble.innerText = text;

    message.appendChild(bubble);

    chatBox.appendChild(message);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function aiResponse(message){

    message = message.toLowerCase();

    if(message.includes("xin chào")){
        return "Chào bạn 😄 Tôi có thể giúp gì cho bạn?";
    }

    if(message.includes("bạn là ai")){
        return "Tôi là AI trò chuyện được tạo bằng HTML, CSS và JavaScript 🤖";
    }

    if(message.includes("truyện cười")){
        return "Tại sao lập trình viên thích mùa đông? Vì có nhiều bug được đóng băng 😆";
    }

    if(message.includes("buồn")){
        return "Nếu bạn đang buồn, hãy thử nghỉ ngơi, nghe nhạc hoặc nói chuyện với người bạn tin tưởng 💙";
    }

    if(message.includes("code")){
        return "Tôi có thể giúp bạn viết HTML, CSS, JavaScript và nhiều thứ khác 🚀";
    }

    return "Tôi đang suy nghĩ 🤔";
}

function sendMessage(){

    const input = document.getElementById("userInput");

    const text = input.value.trim();

    if(text === "") return;

    addMessage(text, "user");

    input.value = "";

    const typing = document.createElement("div");

    typing.classList.add("typing");

    typing.id = "typing";

    typing.innerText = "AI đang nhập...";

    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    setTimeout(() => {

        document.getElementById("typing").remove();

        const reply = aiResponse(text);

        addMessage(reply, "bot");

    }, 1000);
}

document.getElementById("userInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
