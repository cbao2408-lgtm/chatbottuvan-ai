<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot API</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-container{
  width:420px;
  height:700px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 25px rgba(0,0,0,0.15);
  display:flex;
  flex-direction:column;
}

.header{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
  background:#f7f9fc;
}

.message{
  display:flex;
  margin-bottom:15px;
}

.user{
  justify-content:flex-end;
}

.bot{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:12px 15px;
  border-radius:15px;
  line-height:1.5;
}

.user .bubble{
  background:#4facfe;
  color:white;
  border-bottom-right-radius:5px;
}

.bot .bubble{
  background:#e3f2fd;
  color:#333;
  border-bottom-left-radius:5px;
}

.input-box{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#2196f3;
}

</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    AI Tư Vấn Tâm Lý
  </div>

  <div class="chat-box" id="chatBox">

    <div class="message bot">
      <div class="bubble">
        Xin chào 👋<br>
        Tôi là AI hỗ trợ tâm lý. Hãy chia sẻ với tôi nhé.
      </div>
    </div>

  </div>

  <div class="input-box">

    <input type="text"
           id="userInput"
           placeholder="Nhập tin nhắn...">

    <button onclick="sendMessage()">
      Gửi
    </button>

  </div>

</div>

<script>

const API_KEY = "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";

function addMessage(text, sender){

  const chatBox = document.getElementById("chatBox");

  const message = document.createElement("div");

  message.classList.add("message", sender);

  const bubble = document.createElement("div");

  bubble.classList.add("bubble");

  bubble.innerHTML = text;

  message.appendChild(bubble);

  chatBox.appendChild(message);

  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

  const input = document.getElementById("userInput");

  const text = input.value.trim();

  if(text === "") return;

  addMessage(text, "user");

  input.value = "";

  addMessage("Đang suy nghĩ...", "bot");

  try{

    const response = await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        method:"POST",

        headers:{
          "Authorization":"Bearer " + API_KEY,
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          model:"openai/gpt-3.5-turbo",

          messages:[

            {
              role:"system",
              content:"Bạn là AI tư vấn tâm lý nhẹ nhàng, thân thiện và tích cực."
            },

            {
              role:"user",
              content:text
            }

          ]

        })

      }
    );

    const data = await response.json();

    const botReply =
      data.choices[0].message.content;

    const chatBox =
      document.getElementById("chatBox");

    chatBox.lastChild.remove();

    addMessage(botReply, "bot");

  }
  catch(error){

    const chatBox =
      document.getElementById("chatBox");

    chatBox.lastChild.remove();

    addMessage(
      "Lỗi kết nối API ❌",
      "bot"
    );

    console.log(error);
  }

}

document
.getElementById("userInput")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
