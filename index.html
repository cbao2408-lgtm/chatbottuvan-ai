<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<style>

body{
  font-family:Arial;
  background:#f2f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat{
  width:400px;
  height:650px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
}

.header{
  background:#4facfe;
  color:white;
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin-bottom:10px;
}

.user{
  text-align:right;
}

.bot{
  text-align:left;
}

.bubble{
  display:inline-block;
  padding:10px 14px;
  border-radius:12px;
  max-width:75%;
}

.user .bubble{
  background:#4facfe;
  color:white;
}

.bot .bubble{
  background:#e9eef5;
}

.input-box{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-left:10px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="chat">

  <div class="header">
    AI Tâm Lý
  </div>

  <div class="messages" id="messages">

    <div class="msg bot">
      <div class="bubble">
        Xin chào 👋 Tôi luôn sẵn sàng lắng nghe bạn.
      </div>
    </div>

  </div>

  <div class="input-box">

    <input
      type="text"
      id="input"
      placeholder="Nhập tin nhắn..."
    >

    <button onclick="sendMessage()">
      Gửi
    </button>

  </div>

</div>

<script>

// DÁN API KEY CỦA BẠN Ở ĐÂY
const API_KEY = "YOUR_API_KEY";

function addMessage(text,type){

  const messages =
    document.getElementById("messages");

  const div =
    document.createElement("div");

  div.className = "msg " + type;

  div.innerHTML =
  `
    <div class="bubble">
      ${text}
    </div>
  `;

  messages.appendChild(div);

  messages.scrollTop =
    messages.scrollHeight;
}

async function sendMessage(){

  const input =
    document.getElementById("input");

  const text = input.value.trim();

  if(!text) return;

  addMessage(text,"user");

  input.value = "";

  addMessage("Đang trả lời...","bot");

  try{

    const response =
      await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {

        method:"POST",

        headers:{
          "Authorization":
            `Bearer ${API_KEY}`,

          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({

          model:
            "mistralai/mistral-7b-instruct:free",

          messages:[
            {
              role:"system",
              content:
              "Bạn là AI tư vấn tâm lý nhẹ nhàng, thân thiện và tích cực."
            },

            {
              role:"user",
              content:text
            }
          ]

        })

      });

    const data =
      await response.json();

    document
      .querySelector(".messages")
      .lastChild
      .remove();

    addMessage(
      data.choices[0].message.content,
      "bot"
    );

  }
  catch(err){

    document
      .querySelector(".messages")
      .lastChild
      .remove();

    addMessage(
      "Lỗi API ❌",
      "bot"
    );

    console.log(err);
  }
}

document
.getElementById("input")
.addEventListener("keypress",function(e){

  if(e.key==="Enter"){
    sendMessage();
  }

});

</script>

</body>
</html>
